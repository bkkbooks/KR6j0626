body:
  text: 後漢失譯人名如是我聞一時佛住舍衛國祇樹給孤獨園與千二百五十比丘皆阿羅漢諸漏已盡身心澄靜六通無礙其名曰大智舍利弗摩訶目揵連摩訶迦葉摩訶迦旃延須菩提等復有菩薩摩訶薩八千人俱文殊師利菩薩導師菩薩虛空藏菩薩觀世音菩薩救脫菩薩如是等菩薩摩訶薩威德自在復有比丘比丘尼優婆塞優婆夷天龍夜叉八部鬼神共相圍繞説微妙法時有離車長者子五十人俱身坌塵土懷憂愁戚猶如有人生失父母所愛妻子來至佛所頭面作禮却住一面爾時世尊知而故問諸長者子以何因緣而有惱色憂愁不樂失於常容時諸長者子同聲俱白佛言世尊未審人居世間頗有家宅吉凶以不佛即答言如是諸事皆由衆生心行夢想所造不得都無諸離車等白佛言世尊弟子等蒙宿緣一毫之福得覩如來慈化無遺開甘露門潤以法雨復有何罪生此五濁極惡之世懷憂抱苦怖懼萬端不捨須臾所以言者自惟弟子德淺福薄所居舍宅災怪頻疊惡魔日夜競共侵陵坐臥不安如懷湯火自頃已來失去善心無所恃怙唯願世尊受弟子請臨降所居賜為安宅敕諸守宅諸神及四時禁忌常來榮衛使日夜安吉災禍消滅佛言善哉善哉當如汝説吾自知時爾時世尊明旦敕諸弟子可各整衣服當入聚落各持應器往至長者子舍飯食既畢敷轉輪座為諸長者説微妙法令離怖畏身心悅樂時諸離車各生歡喜猶如比丘入第三禪爾時世尊即呼守宅諸神來到佛所而告之言自今已後是諸神鬼不得妄作恐動令某等不安恆懷憂怖吾當使大力鬼神碎滅汝身令如微塵爾時世尊復告大衆諸善男子善女人等吾涅槃後五百歲中衆生垢重邪見轉熾魔道競興妖魅妄作窺人門戶各伺人便覓人長短為作不祥種種留難當爾之時是諸弟子應當一心念佛念法念比丘僧齋戒清淨奉持三歸五戒十善八關齋戒日夕六時禮拜懺悔勤心精進請清淨僧設安宅齋燒衆名香然燈續明露出中庭讀是經典某等安居立宅已來建立南庌北堂東西之廂碓磨倉庫井竈門牆園林池沼六畜之欄或復移房動土穿鑿非時或犯觸伏龍騰蛇青龍白虎朱雀玄武六甲禁忌十二時神門庭戶陌井竈精露堂上戶中溷邊之神我今持諸佛神力菩薩威光般若波羅蜜力敕宅前宅後宅左宅右宅中守神神子神母伏龍騰蛇六甲禁忌十二時神飛尸邪忤魍魎鬼神因託形聲寄名附著自今已後不得妄嬈我弟子等神子神母宅中諸神邪魅蠱道魍魎弊魔各安所在不得妄相侵陵為作衰惱令某甲等驚動怖畏當如我教若不順我語令汝等頭破作七分如多羅樹枝爾時世尊而説呪曰南無佛陀四野南無達摩四野南無僧伽四野今為弟子某甲承佛威力而説神呪一足衆生莫惱我二足衆生莫惱我三足衆生莫惱我四足衆生莫惱我我有一切大慈大悲愍念一切衆生汝等惡魔各還所屬不得橫忓擾亂我弟子等復説呪曰白黑龍王善子龍王漚鉢羅龍王阿耨大龍王結界呪文伽婆致伽婆致悉波呵東方大神龍王七里結界金剛宅南方大神龍王七里結界金剛宅西方大神龍王七里結界金剛宅北方大神龍王七里結界金剛宅如是三説東方婆鳩深山娑羅伽扠汝百鬼頸著枷南方婆鳩深山娑羅伽扠汝百鬼頸著枷西方婆鳩深山娑羅伽扠汝百鬼頸著枷北方婆鳩深山娑羅伽扠汝百鬼頸著枷如是三説主疾病者主頭痛者主人舍宅門戶者當斂諸毒不得擾我諸弟子若不順我呪頭破作七分爾時世尊而説偈言造宅立堂宇安育諸群生園林并池沼門牆及與圊起心興舍室動靜應聖靈稽首歸命佛衆魔莫能傾明燈照無極五眼因之生法王大呪力動破魔億千如來慈普潤威光徹無邊莫等咸歸命衆邪各自遷佛告日月五星二十八宿天神龍鬼皆來受教明聽佛告言不得前却某甲之家或作東廂西廂南𭓟北堂敕日遊月殺土府將軍青龍白虎朱雀玄武歲月劫殺六甲禁忌土府伏龍莫妄東西若有動靜燒香啓聞某甲宅舍是佛金剛之地面二百步佛有約言諸疫鬼神不得妄忤忤者頭破作七分身不得全不得水漿去離本宮宅舍已成富貴吉遷田作大得所願光榮行來在軍仕宦宜官門戶昌熾百子千孫父慈子孝男女忠貞兄良弟順崇義仁賢所願如意十方證明行如菩薩得道如佛佛告阿難若欲安宅露出中庭然四十九燈掃灑燒香一心懺悔禮十方諸佛阿難又白佛言當何名斯經佛語阿難此經名如來大悲不可思議神力亦名愍念衆生安宅破魔神呪佛説經竟大衆歡喜作禮奉行
